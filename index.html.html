<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>視覺化分段計時器 - 完美背景運作版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden !important; 
        margin: 0;
        padding: 0;
        background-color: #f1f5f9;
    }
    #root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .svg-container svg {
        width: 100%;
        height: 100%;
        max-width: 440px;
        max-height: 440px;
    }
  </style>
</head>
<body class="text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- SVG 圖示組件 ---
    const Play = ({ size = 24, fill = "none", className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>
    );
    const Pause = ({ size = 24, fill = "none" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    );
    const RotateCcw = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    );
    const Settings = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    );
    const Plus = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    );
    const Trash2 = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    );
    const Volume2 = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    );
    const VolumeX = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    );

    // 預設的活動分段
    const defaultSegments = [
      { id: '1', name: '專注學習', minutes: 15, color: '#3B82F6' },
      { id: '2', name: '短暫休息', minutes: 5, color: '#22C55E' },
      { id: '3', name: '專注學習', minutes: 15, color: '#3B82F6' },
      { id: '4', name: '自由時間', minutes: 10, color: '#F59E0B' },
    ];

    const App = () => {
      const [segments, setSegments] = useState(defaultSegments);
      const [isRunning, setIsRunning] = useState(false);
      const [elapsedTime, setElapsedTime] = useState(0); 
      const [isEditing, setIsEditing] = useState(false);
      const [soundEnabled, setSoundEnabled] = useState(true);
      const [alarmType, setAlarmType] = useState('medium'); 
      
      const startTimeRef = useRef(null);
      const pausedTimeRef = useRef(0);
      const audioContextRef = useRef(null);
      const workerRef = useRef(null); // 新增：用來存放背景勞工的參照

      // --- 為背景計時器準備最新的狀態參照 ---
      const alarmTypeRef = useRef(alarmType);
      useEffect(() => { alarmTypeRef.current = alarmType; }, [alarmType]);

      const soundEnabledRef = useRef(soundEnabled);
      useEffect(() => { soundEnabledRef.current = soundEnabled; }, [soundEnabled]);

      const segmentsRef = useRef(segments);
      useEffect(() => { segmentsRef.current = segments; }, [segments]);

      const prevSegmentIndexRef = useRef(0);
      const hasPlayedEndSoundRef = useRef(false);

      // --- 音效解鎖與初始化 ---
      const initAudio = () => {
        if (!soundEnabledRef.current) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          
          if (!audioContextRef.current) {
            audioContextRef.current = new AudioContext();
          }
          const ctx = audioContextRef.current;
          if (ctx.state === 'suspended') {
            ctx.resume().catch(() => {});
          }
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          gain.gain.value = 0; 
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.01);
        } catch (e) {
          console.error("Audio init failed", e);
        }
      };

      // --- 音效邏輯 ---
      const playSound = (type, isFinal = false) => {
        if (!soundEnabledRef.current) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;

          if (!audioContextRef.current) {
            audioContextRef.current = new AudioContext();
          }
          const ctx = audioContextRef.current;
          if (ctx.state === 'suspended') ctx.resume().catch(() => {});
          
          const playTone = (freq, wave, startOffset, dur, vol) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); 
            gain.connect(ctx.destination);
            osc.type = wave; 
            osc.frequency.setValueAtTime(freq, ctx.currentTime + startOffset);
            
            const startTime = ctx.currentTime + startOffset;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(vol, startTime + 0.05);
            gain.gain.linearRampToValueAtTime(0, startTime + dur);
            
            osc.start(startTime); 
            osc.stop(startTime + dur);
          };
          
          // 統一響 3 聲
          if (type === 'soft') { 
              for (let i = 0; i < 3; i++) { playTone(432, 'sine', i * 1.5, 2, 0.3); }
          }
          else if (type === 'exciting') { 
              for (let i = 0; i < 3; i++) {
                  playTone(880, 'square', i * 0.6, 0.1, 0.1); 
                  playTone(1046, 'square', i * 0.6 + 0.15, 0.1, 0.1);
              }
          }
          else { 
              for (let i = 0; i < 3; i++) { playTone(523, 'sine', i * 0.8, 1, 0.4); }
          }
        } catch (e) {
            console.error("Audio failed", e);
        }
      };

      // --- 絕對防禦版的秒數核心 (不再依賴 React 渲染順序) ---
      useEffect(() => {
        // --- 新增：建立 Web Worker 防止瀏覽器在背景休眠 ---
        if (!workerRef.current) {
          const workerCode = `
            let interval = null;
            self.onmessage = function(e) {
              if (e.data === 'start') {
                if(interval) clearInterval(interval);
                // 在背景每 100 毫秒喚醒一次主程式
                interval = setInterval(() => self.postMessage('tick'), 100);
              } else if (e.data === 'stop') {
                clearInterval(interval);
                interval = null;
              }
            };
          `;
          const blob = new Blob([workerCode], { type: 'application/javascript' });
          workerRef.current = new Worker(URL.createObjectURL(blob));
        }

        if (isRunning) { 
            startTimeRef.current = Date.now(); 
            workerRef.current.postMessage('start'); // 指示背景勞工開始工作
            
            // 接收來自背景勞工的喚醒訊號
            workerRef.current.onmessage = () => {
                const now = Date.now();
                const newElapsed = pausedTimeRef.current + (now - startTimeRef.current) / 1000;
                
                // 動態計算總時間
                const currentSegments = segmentsRef.current;
                const totalSecs = currentSegments.reduce((acc, s) => acc + s.minutes * 60, 0);

                if (newElapsed >= totalSecs) { 
                    // 1. 時間到的瞬間：立刻主動發聲！絕不錯過！
                    if (!hasPlayedEndSoundRef.current) {
                        playSound(alarmTypeRef.current, true);
                        hasPlayedEndSoundRef.current = true;
                    }
                    // 2. 然後才處理停止
                    setElapsedTime(totalSecs); 
                    setIsRunning(false); 
                } else { 
                    // 檢查是否跨越階段 (換活動了)
                    let acc = 0;
                    let currentIdx = 0;
                    for (let i = 0; i < currentSegments.length; i++) {
                        const segSec = currentSegments[i].minutes * 60;
                        if (newElapsed < acc + segSec) {
                            currentIdx = i;
                            break;
                        }
                        acc += segSec;
                    }

                    // 如果跨越了階段，立刻發聲！
                    if (currentIdx !== prevSegmentIndexRef.current) {
                        playSound(alarmTypeRef.current, false);
                        prevSegmentIndexRef.current = currentIdx;
                    }

                    setElapsedTime(newElapsed); 
                }
            };
        } else { 
            if (workerRef.current) workerRef.current.postMessage('stop');
            if (startTimeRef.current) {
                pausedTimeRef.current += (Date.now() - startTimeRef.current) / 1000; 
                startTimeRef.current = null; 
            }
        }
        
        return () => {
            if (workerRef.current) workerRef.current.postMessage('stop');
        };
      }, [isRunning]);

      // 計算總時間與目前狀態供 UI 使用
      const totalSeconds = useMemo(() => segments.reduce((acc, s) => acc + s.minutes * 60, 0), [segments]);
      const isFinished = totalSeconds > 0 && elapsedTime >= totalSeconds;
      const currentStatus = useMemo(() => {
        let acc = 0;
        for (let i = 0; i < segments.length; i++) {
          const segSec = segments[i].minutes * 60;
          if (elapsedTime < acc + segSec) {
            return { seg: segments[i], idx: i, rem: acc + segSec - elapsedTime };
          }
          acc += segSec;
        }
        return { seg: null, idx: -1, rem: 0 };
      }, [elapsedTime, segments]);

      // --- 按鈕控制 ---
      const handleReset = () => {
        setIsRunning(false);
        setElapsedTime(0);
        pausedTimeRef.current = 0;
        startTimeRef.current = null;
        prevSegmentIndexRef.current = 0;
        hasPlayedEndSoundRef.current = false;
      };

      const toggleTimer = () => {
        initAudio(); // 點擊的瞬間解鎖瀏覽器音效權限
        if (isFinished) handleReset();
        else setIsRunning(!isRunning);
      };

      const handleUpdateSegment = (index, field, value) => {
        const newSegments = [...segments];
        if (field === 'minutes') { value = Math.max(1, parseInt(value) || 1); }
        newSegments[index][field] = value;
        setSegments(newSegments);
        handleReset();
      };

      const handleAddSegment = () => {
        setSegments([...segments, { id: Date.now().toString(), name: '新活動', minutes: 5, color: '#94A3B8' }]);
        handleReset();
      };

      const handleRemoveSegment = (index) => {
        if (segments.length <= 1) return;
        const newSegments = segments.filter((_, i) => i !== index);
        setSegments(newSegments);
        handleReset();
      };

      // --- 繪圖與格式化 ---
      const format = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;

      const getArc = (startP, endP, cx = 150, cy = 150, r = 100) => {
        if (endP - startP >= 0.9999) {
          return `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r} Z`;
        }
        const startAngle = 2 * Math.PI * startP - Math.PI/2;
        const endAngle = 2 * Math.PI * endP - Math.PI/2;
        const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
        const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
        const largeArc = endP - startP > 0.5 ? 1 : 0;
        return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
      };

      return (
        <div className="w-full h-full p-4 sm:p-6 lg:p-10 box-border">
          <div className="bg-white w-full h-full max-w-6xl max-h-[85vh] mx-auto rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200">
            
            {/* Header */}
            <div className="bg-slate-50 px-6 py-4 flex justify-between items-center border-b shrink-0">
              <h1 className="text-xl font-bold text-slate-700">視覺化分段計時器</h1>
              <div className="flex gap-4">
                <button onClick={()=>setSoundEnabled(!soundEnabled)} className="text-slate-400 hover:text-blue-500 transition-colors">
                    {soundEnabled ? <Volume2 /> : <VolumeX />}
                </button>
                <button onClick={()=>{setIsEditing(!isEditing); setIsRunning(false)}} className={`p-1 rounded ${isEditing ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}>
                    <Settings />
                </button>
              </div>
            </div>

            {/* 主要內容區塊 */}
            <div className="flex-1 min-h-0 flex flex-col">
              {!isEditing ? (
                // --- 橫式主畫面排版 ---
                <div className="flex-1 flex flex-col md:flex-row p-4 lg:p-10 gap-6 lg:gap-12 items-center justify-center overflow-hidden">
                  
                  {/* 左方：時鐘區塊 */}
                  <div className="flex-1 w-full flex justify-center items-center min-h-[250px] md:min-h-0 svg-container p-4">
                    <svg viewBox="-15 -15 330 330" className="drop-shadow-xl">
                      <circle cx="150" cy="150" r="100" fill="#f8fafc" stroke="#e2e8f0" strokeWidth="1" />
                      
                      {(() => {
                        let acc = 0;
                        return segments.map((s, i) => {
                          const p = (s.minutes * 60) / totalSeconds;
                          if (p === 0) return null;
                          const path = getArc(acc, acc + p, 150, 150, 100);
                          acc += p;
                          return <path key={i} d={path} fill={s.color} />;
                        });
                      })()}

                      {elapsedTime > 0 && totalSeconds > 0 && (
                          <path d={getArc(0, Math.min(1, elapsedTime/totalSeconds), 150, 150, 101)} fill="white" />
                      )}
                      
                      {(() => {
                        const ticks = [];
                        const totalMins = Math.max(1, Math.round(totalSeconds / 60));
                        const step = totalMins > 60 ? 5 : 1; 
                        
                        for(let i = 0; i < totalMins; i += step) {
                            const isMajor = (i % 5 === 0);
                            const ang = (i / totalMins) * 2 * Math.PI - Math.PI/2;
                            const rIn = 100;
                            const rOut = isMajor ? 108 : 104;
                            ticks.push(<line key={`l-${i}`} x1={150+rIn*Math.cos(ang)} y1={150+rIn*Math.sin(ang)} x2={150+rOut*Math.cos(ang)} y2={150+rOut*Math.sin(ang)} stroke="#94A3B8" strokeWidth={isMajor ? 2 : 1}/>);
                            
                            if (isMajor) {
                                ticks.push(<text key={`t-${i}`} x={150+122*Math.cos(ang)} y={150+122*Math.sin(ang)} textAnchor="middle" dominantBaseline="central" className="text-[14px] font-bold fill-slate-500">{i}</text>);
                            }
                        }
                        const pAng = totalSeconds > 0 ? (elapsedTime/totalSeconds)*2*Math.PI - Math.PI/2 : -Math.PI/2;
                        return (
                            <g>
                                {ticks}
                                <line x1="150" y1="150" x2={150+95*Math.cos(pAng)} y2={150+95*Math.sin(pAng)} stroke="#1E293B" strokeWidth="4" strokeLinecap="round"/>
                                <circle cx="150" cy="150" r="7" fill="#1E293B"/>
                            </g>
                        );
                      })()}
                    </svg>
                  </div>

                  {/* 右方：控制台 */}
                  <div className="w-full md:w-[45%] flex flex-col justify-center gap-5 lg:gap-8 shrink-0">
                    
                    {/* 狀態標籤 */}
                    <div className="flex flex-row items-center gap-3">
                        <div className="text-base lg:text-lg font-bold text-slate-400 whitespace-nowrap">目前進行：</div>
                        {isFinished ? (
                             <div className="text-2xl font-bold text-green-500 animate-bounce">所有活動已完成！</div>
                        ) : currentStatus.seg ? (
                            <div className={`text-2xl lg:text-3xl font-bold px-6 lg:px-8 py-2.5 rounded-xl text-white shadow-md transition-all`} style={{backgroundColor: currentStatus.seg.color}}>
                                {currentStatus.seg.name}
                            </div>
                        ) : (
                            <div className="text-xl font-bold text-slate-400">準備開始</div>
                        )}
                    </div>

                    {/* 倒數計時與按鈕 */}
                    <div className="flex items-center gap-4 lg:gap-6 w-full">
                        <div className="bg-slate-50 rounded-3xl px-5 py-6 lg:px-6 lg:py-8 border border-slate-200 shadow-inner flex-1 flex flex-col justify-center">
                            <div className="text-6xl lg:text-[5rem] font-mono font-bold text-slate-700 tracking-tighter leading-none mb-1">
                                {currentStatus.seg && !isFinished ? format(currentStatus.rem) : '00:00'}
                            </div>
                            <div className="text-sm font-bold text-slate-400 mt-2 lg:mt-3">本階段剩餘</div>
                        </div>

                        <div className="flex items-center gap-3 shrink-0">
                            <button onClick={handleReset} className="p-4 lg:p-5 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200 transition-all shadow-sm">
                                <RotateCcw size={26}/>
                            </button>
                            <button onClick={toggleTimer} className={`p-5 lg:p-6 rounded-full text-white shadow-lg transition-all transform active:scale-95 ${isRunning?'bg-amber-500':'bg-blue-600'}`}>
                                {isRunning ? <Pause size={34} fill="currentColor"/> : <Play size={34} fill="currentColor" className="ml-1"/>}
                            </button>
                        </div>
                    </div>

                    {/* 總進度條 */}
                    <div className="w-full">
                        <div className="flex h-3 lg:h-4 rounded-full bg-slate-200 overflow-hidden shadow-inner mb-2">
                            {segments.map((s, i) => {
                                const dur = s.minutes*60, start = segments.slice(0,i).reduce((a,c)=>a+c.minutes*60,0);
                                let fill = 0; if(elapsedTime>=start+dur) fill=100; else if(elapsedTime>start) fill=((elapsedTime-start)/dur)*100;
                                return <div key={i} style={{width:`${(dur/totalSeconds)*100}%`}} className="h-full relative border-r border-white/30 last:border-0">
                                    <div className="absolute inset-0 opacity-20" style={{backgroundColor:s.color}} />
                                    <div className="absolute inset-y-0 left-0 h-full transition-all" style={{width:`${fill}%`, backgroundColor:s.color}} />
                                </div>
                            })}
                        </div>
                        <div className="flex justify-between text-xs font-bold text-slate-400 px-1">
                            <span>0 分鐘</span>
                            <span>總時長 {Math.floor(totalSeconds/60)} 分鐘</span>
                        </div>
                    </div>

                  </div>
                </div>
              ) : (
                // --- 設定模式畫面 ---
                <div className="h-full flex flex-col space-y-4 p-6">
                    <div className="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-4 pr-2 min-h-0">
                        {segments.map((s, i) => (
                            <div key={s.id} className="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 h-fit">
                                <input type="color" value={s.color} onChange={e=>handleUpdateSegment(i,'color',e.target.value)} className="w-10 h-10 rounded cursor-pointer shrink-0 border-0 p-0"/>
                                <input type="text" value={s.name} onChange={e=>handleUpdateSegment(i,'name',e.target.value)} className="flex-1 p-2 rounded-lg border text-sm focus:ring-2 focus:ring-blue-400 min-w-0" placeholder="活動名稱"/>
                                <div className="flex items-center bg-white border rounded-lg px-2 shrink-0">
                                    <input type="number" min="1" value={s.minutes} onChange={e=>handleUpdateSegment(i,'minutes',e.target.value)} className="w-12 p-1 text-center font-bold outline-none"/>
                                    <span className="text-xs text-slate-400">分</span>
                                </div>
                                <button onClick={()=>handleRemoveSegment(i)} disabled={segments.length <= 1} className={`p-2 shrink-0 ${segments.length <= 1 ? 'text-slate-300' : 'text-red-400 hover:bg-red-50 rounded-lg'}`}>
                                    <Trash2 size={20}/>
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 shrink-0">
                        <div className="flex items-center justify-between mb-3">
                            <div className="text-sm font-bold text-slate-700">時間到 / 切換活動 提示音</div>
                            <button onClick={()=>playSound(alarmType, true)} className="text-xs flex items-center bg-white border px-3 py-1.5 rounded-lg text-slate-600 shadow-sm hover:bg-slate-100"><Volume2 size={14} className="mr-1"/>試聽</button>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3">
                            {['soft','medium','exciting'].map(t => (
                                <label key={t} className={`flex-1 flex items-center justify-center p-3 rounded-lg border-2 cursor-pointer transition-all ${alarmType===t?'border-blue-400 bg-blue-50 text-blue-600':'border-transparent bg-white text-slate-600 hover:border-slate-200'}`}>
                                    <input type="radio" name="sound" value={t} checked={alarmType===t} onChange={()=>setAlarmType(t)} className="hidden" />
                                    <span className="text-sm font-bold">{t==='soft'?'柔和 (水晶音)':t==='medium'?'適中 (提示音)':'激動 (鬧鐘聲)'}</span>
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="flex justify-between items-center shrink-0 pt-2 border-t">
                        <button onClick={handleAddSegment} className="flex items-center gap-1 text-blue-600 font-bold px-4 py-2 hover:bg-blue-50 rounded-xl"><Plus size={18}/> 新增活動階段</button>
                        <button onClick={()=>setIsEditing(false)} className="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold shadow-md hover:bg-slate-700">完成設定</button>
                    </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
